server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # IMPORTANT: do NOT use Kubernetes DNS here.
  # Option A: Do not proxy API at all (recommended) — API is served by api.cameroonskills.org via VPS nginx.
  # So leave this block out completely.
}