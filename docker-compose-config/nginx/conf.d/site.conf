# HTTP → HTTPS redirect
server {
    listen 80;
    server_name cameroonskills.org www.cameroonskills.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name api.cameroonskills.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Frontend
server {
    listen 443 ssl http2;
    server_name cameroonskills.org www.cameroonskills.org;

    ssl_certificate /etc/letsencrypt/live/cameroonskills.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cameroonskills.org/privkey.pem;

    location / {
        proxy_pass http://frontend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# HTTPS — Backend API
server {
    listen 443 ssl http2;
    server_name api.cameroonskills.org;

    ssl_certificate /etc/letsencrypt/live/cameroonskills.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cameroonskills.org/privkey.pem;

    location / {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
